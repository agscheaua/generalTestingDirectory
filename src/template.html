<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Repository</title>
  </head>
  <body>
    <form action="" method="" class="formContainer" novalidate>
      <div class="quizzContainer">
        <div class="emailContainer formControl">
          <label for="email" class="labelSpace">Email:</label>
          <input id="email" class="inputSpace" name="emailUser" type="email" required>
        </div>
        <div class="emailError errorMsj"></div>
        <div class="countryContainer formControl">
          <label for="country" class="labelSpace">Country:</label>
          <input id="country" class="inputSpace" name="countryUser" type="text" required>
        </div>
        <div class="countryError errorMsj"></div>
        <div class="postalCodeContainer formControl">
          <label for="postalCode" class="labelSpace">Postal code:</label>
          <input id="postalCode" class="inputSpace" name="postalCodeUser" type="text" required>
        </div>
        <div class="postalCodeError errorMsj"></div>
        <div class="passwordContainer formControl">
          <label for="password" class="labelSpace">Password:</label>
          <input id="password" class="inputSpace" name="passwordUser" type="text" minlength="8" maxlength="24" required>
        </div>
        <div class="passwordError errorMsj"></div>
        <div class="confirmPasswordContainer formControl">
          <label for="confirmPassword" class="labelSpace">Confirm password:</label>
          <input id="confirmPassword" class="inputSpace" name="confirmPasswordUser" type="text" minlength="8" maxlength="24" required>
        </div>
        <div class="confirmPasswordError errorMsj"></div>
      </div>
      <button type="submit" class="submitButton">Submit</button>
    </form>
  </body>
</html>
